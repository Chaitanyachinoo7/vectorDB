services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CHROMA_PATH: /data/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - ./app:/app/app
      - chroma_data:/data/chroma
    command: ["uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  chroma_data:
